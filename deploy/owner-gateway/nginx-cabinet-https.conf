limit_req_zone $binary_remote_addr zone=owner_gateway_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=owner_gateway_sensitive:10m rate=2r/s;

server {
    listen 80;
    listen [::]:80;
    server_name cabinet.temichevvet.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cabinet.temichevvet.ru;

    ssl_certificate /etc/letsencrypt/live/cabinet.temichevvet.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cabinet.temichevvet.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;
    proxy_headers_hash_max_size 1024;
    proxy_headers_hash_bucket_size 128;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /v1/portal/sessions {
        limit_req zone=owner_gateway_sensitive burst=6 nodelay;
        proxy_pass http://127.0.0.1:4100;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header X-Powered-By;
    }

    location ^~ /internal/ {
        limit_req zone=owner_gateway_sensitive burst=12 nodelay;
        proxy_pass http://127.0.0.1:4100;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header X-Powered-By;
    }

    location = /v1/webhooks/max {
        limit_req zone=owner_gateway_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:4100;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header X-Powered-By;
    }

    location / {
        limit_req zone=owner_gateway_general burst=30 nodelay;
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_hide_header X-Powered-By;
    }
}
