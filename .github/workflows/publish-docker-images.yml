name: Publish Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "api=ghcr.io/${owner}/${repo}-api" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${owner}/${repo}-web" >> "$GITHUB_OUTPUT"

      - name: Set build metadata
        id: metadata
        shell: bash
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "source=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TEMICHEVVET_GIT_COMMIT=${{ github.sha }}
            TEMICHEVVET_BUILD_DATE=${{ steps.metadata.outputs.date }}
            TEMICHEVVET_IMAGE_SOURCE=${{ steps.metadata.outputs.source }}
          tags: |
            ${{ steps.images.outputs.api }}:stable
            ${{ steps.images.outputs.api }}:${{ github.sha }}

      - name: Build and publish web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TEMICHEVVET_GIT_COMMIT=${{ github.sha }}
            TEMICHEVVET_BUILD_DATE=${{ steps.metadata.outputs.date }}
            TEMICHEVVET_IMAGE_SOURCE=${{ steps.metadata.outputs.source }}
          tags: |
            ${{ steps.images.outputs.web }}:stable
            ${{ steps.images.outputs.web }}:${{ github.sha }}
