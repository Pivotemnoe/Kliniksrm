services:
  api:
    image: ${TEMICHEVVET_API_IMAGE:-temichevvet-api:local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: clinic-crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 4000
      APP_URL: ${APP_URL:-http://127.0.0.1:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-clinic_crm}:${POSTGRES_PASSWORD:-clinic_crm}@postgres:5432/${POSTGRES_DB:-clinic_crm}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-clinic-crm-local}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-clinic-crm}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-clinic-crm-password}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-clinic_crm_session}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-15}
      SEED_ON_START: ${SEED_ON_START:-true}
      CLIENT_PORTAL_ONLINE_REQUESTS_ENABLED: ${CLIENT_PORTAL_ONLINE_REQUESTS_ENABLED:-false}
      CLIENT_PORTAL_PUBLIC_URL: ${CLIENT_PORTAL_PUBLIC_URL:-}
      OWNER_GATEWAY_URL: ${OWNER_GATEWAY_URL:-}
      OWNER_GATEWAY_SYNC_SECRET: ${OWNER_GATEWAY_SYNC_SECRET:-}
      OWNER_GATEWAY_REQUEST_TIMEOUT_MS: ${OWNER_GATEWAY_REQUEST_TIMEOUT_MS:-30000}
      NOTIFICATION_DISPATCH_INTERVAL_MS: ${NOTIFICATION_DISPATCH_INTERVAL_MS:-30000}
      CRM_SOURCE_VERSION: ${CRM_SOURCE_VERSION:-local}
      MAX_BOT_NAME: ${MAX_BOT_NAME:-}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      MAX_API_BASE_URL: ${MAX_API_BASE_URL:-https://platform-api2.max.ru}
      NODE_EXTRA_CA_CERTS: /app/certs/russian_trusted_root_ca.pem
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    ports:
      - "127.0.0.1:${API_HOST_PORT:-4000}:4000"

  web:
    image: ${TEMICHEVVET_WEB_IMAGE:-temichevvet-web:local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-protected}
        VITE_IDLE_LOGOUT_MINUTES: ${VITE_IDLE_LOGOUT_MINUTES:-15}
    container_name: clinic-crm-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_BIND_ADDR:-127.0.0.1}:${WEB_PORT:-3000}:80"

  postgres:
    image: postgres:16-alpine
    container_name: clinic-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic_crm}
      POSTGRES_USER: ${POSTGRES_USER:-clinic_crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_crm}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic_crm} -d ${POSTGRES_DB:-clinic_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clinic-crm-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: clinic-crm-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clinic-crm}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clinic-crm-password}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  backup:
    image: postgres:16-alpine
    container_name: clinic-crm-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-18000}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-clinic_crm}
      POSTGRES_USER: ${POSTGRES_USER:-clinic_crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_crm}
    volumes:
      - ./backups:/backups
      - redis_data:/redis-data:ro
      - minio_data:/minio-data:ro
      - ./scripts/backup-docker-loop.sh:/usr/local/bin/backup-docker-loop.sh:ro
    command: ["sh", "/usr/local/bin/backup-docker-loop.sh"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
